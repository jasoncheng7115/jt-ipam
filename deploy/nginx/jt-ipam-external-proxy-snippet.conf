# =============================================================================
# jt-ipam — nginx proxy snippet（外部反向代理模式 / external reverse proxy mode）
#
# 搭配 jt-ipam-external-proxy.conf 使用。安裝到 /etc/nginx/snippets/jt-ipam-proxy.conf。
#
# 關鍵差異（vs 預設 jt-ipam-proxy.conf）：
#   X-Forwarded-Proto 改傳 $jt_fwd_proto（由 site 設定的 map 取 $http_x_forwarded_proto，
#   空值預設 https），而非 $scheme。
#
#   原因：本機 nginx 收到的是 HTTP，$scheme 恆為 "http"。若把 "http" 往後傳，FastAPI 會
#   以為是不安全連線 → Secure session cookie 設不起來 / OIDC callback 失敗。改用外部 NGINX
#   傳入的 X-Forwarded-Proto（https），協定才會正確透傳到後端。
# =============================================================================
proxy_set_header Host               $host;
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $jt_fwd_proto;   # ← 外部代理模式的關鍵設定

proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_read_timeout 90s;
proxy_connect_timeout 5s;
proxy_send_timeout 60s;
proxy_buffering off;
