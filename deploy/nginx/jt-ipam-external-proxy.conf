# =============================================================================
# jt-ipam — nginx site（外部反向代理模式 / external reverse proxy mode）
#
# 使用情境：前端另有一台 NGINX（或其他 LB）負責 SSL 終結，本機 NGINX 只做 HTTP。
#   瀏覽器 → HTTPS → 外部 NGINX → HTTP:80 → 本機 NGINX → loopback 127.0.0.1:8000 → FastAPI
#
# 安裝（取代預設的 jt-ipam.conf）：
#   sudo cp deploy/nginx/jt-ipam-external-proxy.conf         /etc/nginx/sites-available/jt-ipam
#   sudo cp deploy/nginx/jt-ipam-external-proxy-snippet.conf /etc/nginx/snippets/jt-ipam-proxy.conf
#   sudo ln -sf /etc/nginx/sites-available/jt-ipam /etc/nginx/sites-enabled/jt-ipam
#   sudo nginx -t && sudo systemctl reload nginx
#
# 另外務必：
#   - /etc/jt-ipam/backend.env 的 APP_PUBLIC_URL / API_PUBLIC_URL / CORS_ORIGINS
#     設為對外網域（https://ipam.your-domain.com），不要留 ipam.example.com
#   - 外部 NGINX 轉發時要送 X-Forwarded-Proto $scheme（=https）與 Host $host
#   - HSTS 由持有憑證的「外部 NGINX」送出，本機不送（本機是 HTTP）
# =============================================================================
server_tokens off;

limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=1200r/m;
limit_req_status 429;

map $sent_http_content_type $expires {
    default                 off;
    text/html               -1;
    ~image/                 30d;
    ~font/                  30d;
    application/javascript  7d;
    text/css                7d;
}

# 外部代理應送 X-Forwarded-Proto；萬一沒送（空字串），本模式既然在 TLS 終結代理後，預設視為 https。
map $http_x_forwarded_proto $jt_fwd_proto {
    default $http_x_forwarded_proto;
    ""      https;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP（明文，專用埠 8088）— 只服務 Graylog DSV 對照表（同預設設定）
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 8088;
    listen [::]:8088;
    server_name _;

    location /api/v1/lookup/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }
    location / { return 404; }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP port 80 — 接收外部 NGINX 轉發（SSL 已由外部 NGINX 終結；本機不做 301、不送 HSTS）
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Security headers（A05）── 注意：HSTS 不在此送出，由外部 NGINX 負責
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://www.openstreetmap.org https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ── Frontend（Vite build 後的靜態檔）──
    root /opt/jt-ipam/frontend/dist;
    index index.html;
    expires $expires;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── 反代 API：套限流 ──
    location /api/phpipam/user/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    location /api/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 阻擋常見隱私洩漏路徑 ──
    location ~ /\.(env|git|svn|hg|DS_Store) {
        deny all;
        access_log off;
        return 404;
    }

    # ── 限制請求大小（A04）──
    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 30s;
}
